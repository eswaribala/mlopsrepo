name: Loan Approval Azure ML Batch MLOps Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  RESOURCE_GROUP: training_group
  WORKSPACE_NAME: training-ws
  MODEL_NAME: loan-approval-modelv1

  TEST_BATCH_ENDPOINT: loan-test-batch-endpoint
  TEST_BATCH_DEPLOYMENT: blue

  COMPUTE_NAME: cpu-cluster

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn==1.7.2 joblib python-dotenv

      - name: Train Model
        run: |
          python src/azuremlapp/utils/train.py

      - name: Verify Model Output
        run: |
          ls -R outputs
          test -f outputs/loan_model.pkl

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loan-model
          path: outputs/

  evaluate-model:
    needs: train-model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-model
          path: outputs/

      - name: Validate Model
        run: |
          test -f outputs/loan_model.pkl
          echo "Model validation passed"

  register-model:
    needs: evaluate-model
    runs-on: ubuntu-latest

    outputs:
      model_version: ${{ steps.register.outputs.model_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-model
          path: outputs/

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML Extension
        run: |
          az extension add -n ml --yes
          az extension update -n ml
          az configure --defaults group=$RESOURCE_GROUP workspace=$WORKSPACE_NAME

      - name: Register Model
        id: register
        run: |
          MODEL_VERSION=$(az ml model create \
            --name $MODEL_NAME \
            --type custom_model \
            --path outputs/loan_model.pkl \
            --query version \
            --output tsv)

          echo "Registered model version: $MODEL_VERSION"
          echo "model_version=$MODEL_VERSION" >> $GITHUB_OUTPUT

  deploy-test-batch:
    needs: register-model
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML Extension
        run: |
          az extension add -n ml --yes
          az extension update -n ml
          az configure --defaults group=$RESOURCE_GROUP workspace=$WORKSPACE_NAME

      - name: Show Files
        run: |
          pwd
          ls -la
          ls -la src/azuremlapp/utils
          cat batch-deployment.yml

      - name: Create Test Batch Endpoint If Not Exists
        run: |
          az ml batch-endpoint show \
            --name $TEST_BATCH_ENDPOINT \
            --resource-group $RESOURCE_GROUP \
            --workspace-name $WORKSPACE_NAME || \
          az ml batch-endpoint create \
            --name $TEST_BATCH_ENDPOINT \
            --resource-group $RESOURCE_GROUP \
            --workspace-name $WORKSPACE_NAME

      - name: Create or Update Batch Deployment
        run: |
          az ml batch-deployment create \
            --file batch-deployment.yml \
            --set model=azureml:$MODEL_NAME:${{ needs.register-model.outputs.model_version }} \
            --set name=$TEST_BATCH_DEPLOYMENT \
            --set endpoint_name=$TEST_BATCH_ENDPOINT \
            --resource-group $RESOURCE_GROUP \
            --workspace-name $WORKSPACE_NAME || \
          az ml batch-deployment update \
            --file batch-deployment.yml \
            --set model=azureml:$MODEL_NAME:${{ needs.register-model.outputs.model_version }} \
            --set name=$TEST_BATCH_DEPLOYMENT \
            --set endpoint_name=$TEST_BATCH_ENDPOINT \
            --resource-group $RESOURCE_GROUP \
            --workspace-name $WORKSPACE_NAME

      - name: Set Default Batch Deployment
        run: |
          az ml batch-endpoint update \
            --name $TEST_BATCH_ENDPOINT \
            --defaults deployment_name=$TEST_BATCH_DEPLOYMENT \
            --resource-group $RESOURCE_GROUP \
            --workspace-name $WORKSPACE_NAME

      - name: Create Batch Input CSV
        run: |
          mkdir -p batch-input
          cat > batch-input/loan_input.csv <<EOF
          age,income,credit_score
          35,600000,650
          42,800000,720
          EOF

      - name: Upload Batch Input Data
        id: testdata
        run: |
          DATA_VERSION=$(az ml data create \
            --name loan-test-batch-input \
            --type uri_folder \
            --path batch-input/ \
            --query version \
            --output tsv \
            --resource-group $RESOURCE_GROUP \
            --workspace-name $WORKSPACE_NAME)

          echo "Uploaded data version: $DATA_VERSION"
          echo "data_version=$DATA_VERSION" >> $GITHUB_OUTPUT

      - name: Check Test Batch Endpoint
        run: |
          az ml batch-endpoint show \
            --name $TEST_BATCH_ENDPOINT \
            --resource-group $RESOURCE_GROUP \
            --workspace-name $WORKSPACE_NAME \
            --output table

      - name: Invoke Test Batch Endpoint with Retry
        run: |
          for i in 1 2 3; do
            echo "Invoke attempt $i"

            az ml batch-endpoint invoke \
              --name $TEST_BATCH_ENDPOINT \
              --input azureml:loan-test-batch-input:${{ steps.testdata.outputs.data_version }} \
              --resource-group $RESOURCE_GROUP \
              --workspace-name $WORKSPACE_NAME && break

            echo "Retrying after 30 seconds..."
            sleep 30
          done

  monitor-model:
    needs: deploy-test-batch
    runs-on: ubuntu-latest

    steps:
      - name: Monitoring Placeholder
        run: |
          echo "Batch endpoint deployment completed"
          echo "Check batch job output, logs, failures, and predictions"