name: Loan Approval Azure ML MLOps Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  RESOURCE_GROUP: training_group
  WORKSPACE_NAME: training-ws
  MODEL_NAME: loan-approval-modelv1

  TEST_ENDPOINT: loan-test-endpoint
  TEST_DEPLOYMENT: blue

  PROD_ENDPOINT: loan-prod-endpoint
  PROD_DEPLOYMENT: blue

  INSTANCE_TYPE: Standard_DS3_v2
  INSTANCE_COUNT: 1

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn==1.7.2 joblib python-dotenv

      - name: Train Model
        run: |
          python src/azuremlapp/utils/train.py

      - name: Verify Model Output
        run: |
          ls -R outputs
          test -f outputs/loan_model.pkl

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loan-model
          path: outputs/

  evaluate-model:
    needs: train-model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-model
          path: outputs/

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn==1.7.2 joblib

      - name: Validate Model Exists
        run: |
          echo "Checking model file"
          test -f outputs/loan_model.pkl
          echo "Model validation passed"

  register-model:
    needs: evaluate-model
    runs-on: ubuntu-latest

    outputs:
      model_version: ${{ steps.register.outputs.model_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-model
          path: outputs/

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML Extension
        run: |
          az extension add -n ml --yes
          az configure --defaults group=$RESOURCE_GROUP workspace=$WORKSPACE_NAME

      - name: Register Model
        id: register
        run: |
          MODEL_VERSION=$(az ml model create \
            --name $MODEL_NAME \
            --type custom_model \
            --path outputs/loan_model.pkl \
            --query version \
            --output tsv)

          echo "Registered model version: $MODEL_VERSION"
          echo "model_version=$MODEL_VERSION" >> $GITHUB_OUTPUT

  deploy-test:
    needs: register-model
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML Extension
        run: |
          az extension add -n ml --yes
          az configure --defaults group=$RESOURCE_GROUP workspace=$WORKSPACE_NAME

      - name: Create Test Endpoint If Not Exists
        run: |
          az ml online-endpoint show --name $TEST_ENDPOINT || \
          az ml online-endpoint create \
            --name $TEST_ENDPOINT \
            --auth-mode key

      - name: Deploy Model to Test
        run: |
          az ml online-deployment create \
            --name $TEST_DEPLOYMENT \
            --endpoint-name $TEST_ENDPOINT \
            --model azureml:$MODEL_NAME:${{ needs.register-model.outputs.model_version }} \
            --instance-type $INSTANCE_TYPE \
            --instance-count $INSTANCE_COUNT \
            --code-configuration code=src/azuremlapp/utils,scoring_script=score.py \
            --environment azureml:AzureML-sklearn-1.0-ubuntu20.04-py38-cpu@latest \
            --all-traffic

      - name: Test Endpoint Smoke Test
        run: |
          cat > sample-request.json <<EOF
          {
            "input_data": {
              "columns": ["age", "income", "credit_score"],
              "data": [[35, 600000, 650]]
            }
          }
          EOF

          az ml online-endpoint invoke \
            --name $TEST_ENDPOINT \
            --request-file sample-request.json

  deploy-production:
    needs:
      - register-model
      - deploy-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML Extension
        run: |
          az extension add -n ml --yes
          az configure --defaults group=$RESOURCE_GROUP workspace=$WORKSPACE_NAME

      - name: Create Production Endpoint If Not Exists
        run: |
          az ml online-endpoint show --name $PROD_ENDPOINT || \
          az ml online-endpoint create \
            --name $PROD_ENDPOINT \
            --auth-mode key

      - name: Deploy Model to Production
        run: |
          az ml online-deployment create \
            --name $PROD_DEPLOYMENT \
            --endpoint-name $PROD_ENDPOINT \
            --model azureml:$MODEL_NAME:${{ needs.register-model.outputs.model_version }} \
            --instance-type $INSTANCE_TYPE \
            --instance-count $INSTANCE_COUNT \
            --code-configuration code=src/azuremlapp/utils,scoring_script=score.py \
            --environment azureml:AzureML-sklearn-1.0-ubuntu20.04-py38-cpu@latest \
            --all-traffic

      - name: Production Smoke Test
        run: |
          cat > sample-request.json <<EOF
          {
            "input_data": {
              "columns": ["age", "income", "credit_score"],
              "data": [[42, 800000, 720]]
            }
          }
          EOF

          az ml online-endpoint invoke \
            --name $PROD_ENDPOINT \
            --request-file sample-request.json

      - name: Show Production Endpoint
        run: |
          az ml online-endpoint show --name $PROD_ENDPOINT --output table

  monitor-model:
    needs: deploy-production
    runs-on: ubuntu-latest

    steps:
      - name: Monitoring Placeholder
        run: |
          echo "Production deployment completed"
          echo "Monitor endpoint logs, latency, errors, data drift, and model quality"