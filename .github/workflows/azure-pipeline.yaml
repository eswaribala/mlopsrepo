name: Loan Approval Azure ML Batch MLOps Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  RESOURCE_GROUP: training_group
  WORKSPACE_NAME: training-ws
  MODEL_NAME: loan-approval-modelv1

  TEST_BATCH_ENDPOINT: loan-test-batch-endpoint
  TEST_BATCH_DEPLOYMENT: blue

  PROD_BATCH_ENDPOINT: loan-prod-batch-endpoint
  PROD_BATCH_DEPLOYMENT: blue

  COMPUTE_NAME: cpu-cluster

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn==1.7.2 joblib python-dotenv

      - name: Train Model
        run: |
          python src/azuremlapp/utils/train.py

      - name: Verify Model Output
        run: |
          ls -R outputs
          test -f outputs/loan_model.pkl

      - name: Upload Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: loan-model
          path: outputs/

  evaluate-model:
    needs: train-model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-model
          path: outputs/

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn==1.7.2 joblib

      - name: Validate Model Exists
        run: |
          test -f outputs/loan_model.pkl
          echo "Model validation passed"

  register-model:
    needs: evaluate-model
    runs-on: ubuntu-latest

    outputs:
      model_version: ${{ steps.register.outputs.model_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-model
          path: outputs/

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML Extension
        run: |
          az extension add -n ml --yes
          az extension update -n ml
          az configure --defaults group=$RESOURCE_GROUP workspace=$WORKSPACE_NAME

      - name: Register Model
        id: register
        run: |
          MODEL_VERSION=$(az ml model create \
            --name $MODEL_NAME \
            --type custom_model \
            --path outputs/loan_model.pkl \
            --query version \
            --output tsv)

          echo "model_version=$MODEL_VERSION" >> $GITHUB_OUTPUT

  deploy-test-batch:
    needs: register-model
    runs-on: ubuntu-latest
    environment: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML Extension
        run: |
          az extension add -n ml --yes
          az extension update -n ml
          az configure --defaults group=$RESOURCE_GROUP workspace=$WORKSPACE_NAME

      - name: Create Test Batch Endpoint If Not Exists
        run: |
          az ml batch-endpoint show --name $TEST_BATCH_ENDPOINT || \
          az ml batch-endpoint create \
            --name $TEST_BATCH_ENDPOINT

      - name: Create Test Batch Deployment
        run: |
         az ml batch-deployment create \
          --file batch-deployment.yml

      - name: Create Test Input CSV
        run: |
          mkdir -p batch-input
          cat > batch-input/loan_input.csv <<EOF
          age,income,credit_score
          35,600000,650
          42,800000,720
          EOF

      - name: Upload Test Input Data
        run: |
          az ml data create \
            --name loan-test-batch-input \
            --type uri_folder \
            --path batch-input/

      - name: Invoke Test Batch Endpoint
        run: |
          az ml batch-endpoint invoke \
            --name $TEST_BATCH_ENDPOINT \
            --input azureml:loan-test-batch-input@latest

  deploy-production-batch:
    needs:
      - register-model
      - deploy-test-batch
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML Extension
        run: |
          az extension add -n ml --yes
          az extension update -n ml
          az configure --defaults group=$RESOURCE_GROUP workspace=$WORKSPACE_NAME

      - name: Create Production Batch Endpoint If Not Exists
        run: |
          az ml batch-endpoint show --name $PROD_BATCH_ENDPOINT || \
          az ml batch-endpoint create \
            --name $PROD_BATCH_ENDPOINT

      - name: Create Production Batch Deployment
        run: |
          az ml batch-deployment create \
            --name $PROD_BATCH_DEPLOYMENT \
            --endpoint-name $PROD_BATCH_ENDPOINT \
            --model azureml:$MODEL_NAME:${{ needs.register-model.outputs.model_version }} \
            --compute azureml:$COMPUTE_NAME \
            --code-path src/azuremlapp/utils \
            --scoring-script score.py \
            --environment azureml:AzureML-sklearn-1.0-ubuntu20.04-py38-cpu@latest \
            --instance-count 1 \
            --mini-batch-size 1 \
            --max-concurrency-per-instance 1 \
            --set-default

      - name: Create Production Input CSV
        run: |
          mkdir -p batch-prod-input
          cat > batch-prod-input/loan_input.csv <<EOF
          age,income,credit_score
          45,900000,750
          29,450000,610
          EOF

      - name: Upload Production Input Data
        run: |
          az ml data create \
            --name loan-prod-batch-input \
            --type uri_folder \
            --path batch-prod-input/

      - name: Invoke Production Batch Endpoint
        run: |
          az ml batch-endpoint invoke \
            --name $PROD_BATCH_ENDPOINT \
            --input azureml:loan-prod-batch-input@latest

  monitor-model:
    needs: deploy-production-batch
    runs-on: ubuntu-latest

    steps:
      - name: Monitoring Placeholder
        run: |
          echo "Batch endpoint deployment completed"
          echo "Check batch job status, output predictions, failures, and logs"