name: Loan MLOps Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn==1.7.2 joblib python-dotenv

      - name: Train model
        run: |
          python src/azuremlapp/utils/train.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: loan-model
          path: outputs/

  deploy-test:
    needs: train-model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: loan-model
          path: deployment/

      - name: Show deployment files
        run: |
          ls -R deployment

      - name: Test FastAPI app
        run: |
          pip install fastapi uvicorn pandas scikit-learn==1.7.2 joblib
          cd deployment
          python -c "import app; print('FastAPI app loaded successfully')"

  deploy-prod:
    needs: deploy-test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Production deployment
        run: |
          echo "Deploying to production after approval"